name: Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE:    ${{ github.repository_owner }}/ansible-mcp

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-prod-tag:
    name: Bump image tag in prod overlay
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Bump newTag in prod overlay
        run: |
          cd k8s/manifests/overlays/prod
          kustomize edit set image \
            your-registry/ansible-mcp=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ needs.build-push.outputs.tag }}
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifests/overlays/prod/kustomization.yaml
          git diff --cached --quiet || \
            git commit -m "chore(release): bump prod image tag to ${{ needs.build-push.outputs.tag }} [skip ci]"
          git push
