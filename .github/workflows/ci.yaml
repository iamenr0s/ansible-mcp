name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ansible-lint
        run: ansible-lint workspace/roles/example_role
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
      - name: Validate kustomize overlays
        run: |
          kubectl kustomize k8s/manifests/overlays/dev  > /dev/null
          kubectl kustomize k8s/manifests/overlays/prod > /dev/null

  molecule:
    name: Molecule tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Run molecule (podman driver)
        run: molecule test -s default
        working-directory: workspace/roles/example_role
        env:
          MOLECULE_DRIVER: podman
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
