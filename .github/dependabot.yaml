version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions-all:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    versioning-strategy: increase
    groups:
      ansible-all:
        patterns: ["ansible*", "molecule*", "testinfra"]
      mcp-server:
        patterns: ["mcp*", "uvicorn*", "starlette*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    labels: [dependencies, docker]
    commit-message:
      prefix: "chore(docker)"
