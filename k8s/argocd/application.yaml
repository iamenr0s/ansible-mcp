apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ansible-mcp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: ansible-mcp
spec:
  project: ansible-mcp
  source:
    repoURL: https://github.com/YOUR_ORG/ansible-mcp.git
    targetRevision: main
    path: k8s/manifests/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ansible-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
