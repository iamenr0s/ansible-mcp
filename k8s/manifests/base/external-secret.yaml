---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ansible-mcp-sa
  namespace: ansible-mcp
  labels:
    app.kubernetes.io/name: ansible-mcp

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ansible-ssh-keys
  namespace: ansible-mcp
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: ansible-mcp-vault
    kind: SecretStore
  target:
    name: ansible-ssh-keys
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        annotations:
          managed-by: external-secrets
  data:
    - secretKey: id_rsa
      remoteRef:
        key: ansible-mcp/ssh-keys
        property: id_rsa
    - secretKey: id_rsa.pub
      remoteRef:
        key: ansible-mcp/ssh-keys
        property: id_rsa_pub
