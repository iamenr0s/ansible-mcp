apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ansible-mcp-vault
  namespace: ansible-mcp
spec:
  provider:
    vault:
      server: "https://vault.example.com"   # replace with your Vault address
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ansible-mcp"
          serviceAccountRef:
            name: "ansible-mcp-sa"
