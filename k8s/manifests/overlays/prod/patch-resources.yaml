apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-mcp
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: ansible-mcp
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
